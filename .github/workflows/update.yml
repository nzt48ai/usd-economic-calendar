name: Update USD Calendar

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install requests

      - run: python generate_calendar.py

      - run: |
          git config --global user.name "calendar-bot"
          git config --global user.email "calendar-bot@users.noreply.github.com"
          git add usd_calendar.ics
          git commit -m "update calendar" || echo "no changes"
          git push
